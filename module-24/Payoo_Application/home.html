<!doctype html>
<html data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- daisyui + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- favicon -->
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon">

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Payoo | Home</title>
    <!-- styles -->
    <style type="text/tailwindcss">
        *{
            font-family: "Outfit", sans-serif;
       }
    </style>
</head>

<body class="max-w-md mx-auto bg-base-200">
    <header class="border-b-2 border-gray-300">
        <section class="w-11/12 mx-auto py-5 flex justify-between items-center">
            <div class="left-side flex gap-2 items-center">
                <div class="logo-img max-w-[50px]">
                    <img src="/assets/logo.png" alt="">
                </div>
                <div class="balance-status">
                    <p>$ <span id="balance">45000</span></p>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right-side">
                <button id="logout-btn" class="btn btn-soft text-gray-700 rounded-full"><span class="rotate-180"><i
                            class="fa-solid fa-arrow-right-from-bracket"></i></span>Log Out</button>
            </div>
        </section>

    </header>
    <main>
        <section class="payment-buttons w-11/12 mx-auto">
            <div class="welcome-msg py-8">
                <h2 class="text-2xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
                <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low
                    and </p>
            </div>
            <!-- home all buttons -->
            <div class="buttons grid grid-cols-3 gap-3 justify-between mb-6">
                <button id="add-money-p-btn" class="main-btn btn h-24 py-3 flex-col rounded-2xl" onclick="btnColor(0)">
                    <img src="/assets/opt-1.png" alt="">
                    <p>Add Money</p>
                </button>

                <button id="cash-out-p-btn" class="main-btn btn h-full py-3 flex-col rounded-2xl" onclick="btnColor(1)">
                    <img src="/assets/opt-2.png" alt="">
                    <p>Cash Out</p>
                </button>

                <button id="transfer-money-p-btn" class="main-btn btn h-full py-3 flex-col rounded-2xl" onclick="btnColor(2)">
                    <img src="/assets/opt-3.png" alt="">
                    <p>Transfer Money</p>
                </button>

                <button class="main-btn btn h-24 py-3 flex-col rounded-2xl" onclick="btnColor(3)">
                    <img src="/assets/opt-4.png" alt="">
                    <p>Get Bonus</p>
                </button>

                <button class="main-btn btn h-full py-3 flex-col rounded-2xl" onclick="btnColor(4)">
                    <img src="/assets/opt-5.png" alt="">
                    <p>Pay Bill</p>
                </button>

                <button class="main-btn btn h-full py-3 flex-col rounded-2xl" onclick="btnColor(5)">
                    <img src="/assets/opt-6.png" alt="">
                    <p>Transaction</p>
                </button>

            </div>
        </section>

        <!-- Add money -->
        <section id="add-money-container" class="add-money w-11/12 mx-auto hidden">
            <div class="py-3">
                <h3 class="text-neutral font-bold">Add Money</h3>
            </div>
            <!-- add money form -->
            <div class="card bg-base-100 shadow-2xl rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral/70 font-bold">Select Bank</label>
                        <select class="select w-full rounded-full bg-base-200 focus:outline-none text-neutral/70">
                            <option disabled selected>Select Bank</option>
                            <option>City Bank</option>
                            <option>Grameen Bank</option>
                            <option>Islamic Bank</option>
                            <option>Brac Bank</option>
                            <option>Dhaka Bank</option>
                            <option>Sonali Bank</option>
                        </select>

                        <label class="label text-neutral/70 font-bold">Bank Account Number</label>
                        <input id="bank-account-number" type="text" maxlength="11" minlength="11"
                            class="input w-full rounded-full bg-base-200 focus:outline-none"
                            placeholder="Enter 11 digit user number" />

                        <label class="label text-neutral/70 font-bold">Amount</label>
                        <input id="add-money" type="number"
                            class="input w-full rounded-full bg-base-200 focus:outline-none"
                            placeholder="Enter amount to withdraw" />

                        <label class="label text-neutral/70 font-bold">Pin Number</label>
                        <input id="add-money-pin" type="password"
                            class="input w-full rounded-full bg-base-200 focus:outline-none"
                            placeholder="Enter 4 digit pin number" />

                        <button id="add-money-btn" class="btn btn-primary rounded-full mt-4">Add Money</button>
                    </fieldset>
                </div>
            </div>
        </section>


        <!-- Cash Out Money  -->
        <section id="cash-out-container" class="money-cashout w-11/12 mx-auto hidden">
            <div class="py-3">
                <h3 class="text-neutral font-bold">Cash Out</h3>
            </div>

            <!-- cash out form -->
            <div class="card bg-base-100 shadow-2xl rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral/70 font-bold">Agent Number</label>
                        <input id="agent-number" type="text" maxlength="11" minlength="11"
                            class="input w-full rounded-full bg-base-200 focus:outline-none"
                            placeholder="Enter 11 digit agent number" />

                        <label class="label text-neutral/70 font-bold">Amount</label>
                        <input id="withdraw-amount" type="number"
                            class="input w-full rounded-full bg-base-200 focus:outline-none"
                            placeholder="Enter amount to withdraw" />

                        <label class="label text-neutral/70 font-bold">Pin Number</label>
                        <input id="withdraw-user-pin" type="password"
                            class="input w-full rounded-full bg-base-200 focus:outline-none"
                            placeholder="Enter 4 digit pin number" />

                        <button id="withdraw-btn" class="btn btn-primary rounded-full mt-4">Withdraw
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </section>

        <!-- transfer money -->
        <section id="transfer-money-container" class="money-cashout w-11/12 mx-auto hidden">
            <div class="py-3">
                <h3 class="text-neutral font-bold">Transfer Money</h3>
            </div>
            <!-- transfer money form -->
            <div class="card bg-base-100 shadow-2xl rounded-2xl">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label class="label text-neutral/70 font-bold">User Account Number</label>
                        <input id="user-account-number" type="text" maxlength="11" minlength="11"
                            class="input w-full rounded-full bg-base-200 focus:outline-none"
                            placeholder="Enter 11 digit user number" />

                        <label class="label text-neutral/70 font-bold">Amount</label>
                        <input id="transfer-money" type="number"
                            class="input w-full rounded-full bg-base-200 focus:outline-none"
                            placeholder="Enter amount to withdraw" />

                        <label class="label text-neutral/70 font-bold">Pin Number</label>
                        <input id="transfer-user-pin" type="password"
                            class="input w-full rounded-full bg-base-200 focus:outline-none"
                            placeholder="Enter 4 digit pin number" />

                        <button id="send-now" class="btn btn-primary rounded-full mt-4">Withdraw
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </section>



    </main>
    <script src="script/code_reducer.js"></script>
    <script src="script/addMoney.js"></script>
    <script src="script/transferMoney.js"></script>
    <script src="script/cashout.js"></script>
    <script src="script/home.js"></script>
</body>

</html>
