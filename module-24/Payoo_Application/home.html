<!doctype html>
<html data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- daisyui + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- favicon -->
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon">

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Payoo | Home</title>
    <!-- styles -->
    <style type="text/tailwindcss">
        *{
            font-family: "Outfit", sans-serif;
       }
    </style>
</head>

<body class="max-w-md mx-auto bg-base-200">
    <header class="border-b-2 border-gray-300">
        <section class="w-11/12 mx-auto py-5 flex justify-between items-center">
            <div class="left-side flex gap-2 items-center">
                <div class="logo-img max-w-[50px]">
                    <img src="/assets/logo.png" alt="">
                </div>
                <div class="balance-status">
                    <p>$ <span id="balance">45000</span></p>
                    <p class="text-neutral/50">Available Balance</p>
                </div>
            </div>
            <div class="right-side">
                <button id="logout-btn" class="btn btn-soft text-gray-700 rounded-full"><span class="rotate-180"><i class="fa-solid fa-arrow-right-from-bracket"></i></span>Log Out</button>
            </div>
        </section>

    </header>
    <main>
        <section class="payment-buttons w-11/12 mx-auto">
            <div class="welcome-msg py-8">
                <h2 class="text-2xl font-bold">Welcome to Pay<span class="text-primary">oo</span></h2>
                <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>
            </div>
            <div class="buttons grid grid-cols-3 gap-3 justify-between mb-6">
                <button class="btn  btn-soft h-24 py-3 flex-col rounded-2xl">
                    <img src="/assets/opt-1.png" alt="">
                    <p>Add Money</p>
                </button>

                <button class="btn btn-soft h-full py-3 flex-col rounded-2xl">
                    <img src="/assets/opt-2.png" alt="">
                    <p>Cash Out</p>
                </button>

                <button class="btn btn-soft h-full py-3 flex-col rounded-2xl">
                    <img src="/assets/opt-3.png" alt="">
                    <p>Transfer Money</p>
                </button>

                <button class="btn btn-soft h-24 py-3 flex-col rounded-2xl">
                    <img src="/assets/opt-4.png" alt="">
                    <p>Get Bonus</p>
                </button>

                <button class="btn btn-soft h-full py-3 flex-col rounded-2xl">
                    <img src="/assets/opt-5.png" alt="">
                    <p>Pay Bill</p>
                </button>

                <button class="btn btn-soft h-full py-3 flex-col rounded-2xl">
                    <img src="/assets/opt-6.png" alt="">
                    <p>Transaction</p>
                </button>

            </div>
        </section>

        <section class="transion-history w-11/12 mx-auto">
            <div class="flex justify-between py-3">
                <h3 class="text-neutral font-bold">Latest Payment</h3>
                <p class="text-neutral/50">View All</p>
            </div>

            <div class="transition-cards">

            </div>
            
        </section>
    </main>
    <script src="script/home.js"></script>
</body>

</html>
