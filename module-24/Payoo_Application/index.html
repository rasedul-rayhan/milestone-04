<!doctype html>
<html data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- daisyui + tailwindcss -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- favicon -->
    <link rel="shortcut icon" href="/assets/logo.png" type="image/x-icon">

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <title>Payoo | Login</title>
    <style type="text/tailwindcss">
        *{
            font-family: "Outfit", sans-serif;
       }
    </style>
</head>

<body class="max-w-md mx-auto bg-base-200">
    <section class="login-form py-28">
        <!-- login page logo -->
        <div class="pb-7 max-w-[200px] mx-auto">
            <img class="mx-auto" src="assets/Logo-full.png" alt="">
        </div>

        <!-- login form -->
        <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl mx-auto rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label text-neutral font-bold">Mobile Number</label>
                    <input id="login-number" type="number" maxlength="11" minlength="11"
                        class="input rounded-full bg-base-200 focus:outline-none" placeholder="Email" />

                    <label class="label text-neutral font-bold">4 Digit Pin</label>
                    <input id="login-pin" type="password" class="input rounded-full bg-base-200 focus:outline-none"
                        placeholder="Password" />
                    <div><a class="link link-hover">Forgot password?</a></div>
                    <button id="login-btn" class="btn btn-primary rounded-full mt-4">Login</button>
                </fieldset>
            </div>
        </div>
    </section>

    <script src="script/login.js"></script>
</body>

</html>
